<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contabilità Vendite Fede</title>
<style>
body{font-family:Arial;margin:20px;background:#f5f7fb}
h1{color:#1d4ed8}
input,select,button{padding:8px;margin:5px;width:100%}
.card{background:white;padding:20px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
</style>
</head>
<body>

<h1>Contabilità vendite</h1>

<div class="card">

<label>Data</label> <input type="date" id="data">

<label>Descrizione</label> <input id="desc">

<label>Importo €</label> <input type="number" id="importo">

<button onclick="salva()">Salva</button>

<h3>Movimenti</h3>
<ul id="lista"></ul>

</div>

<script>

let dati = JSON.parse(localStorage.getItem("contabilita")||"[]")

function salva(){
let data=document.getElementById("data").value
let desc=document.getElementById("desc").value
let importo=document.getElementById("importo").value

dati.push({data,desc,importo})

localStorage.setItem("contabilita",JSON.stringify(dati))

mostra()
}

function mostra(){
let lista=document.getElementById("lista")
lista.innerHTML=""

dati.forEach(d=>{
lista.innerHTML+=`<li>${d.data} - ${d.desc} - €${d.importo}</li>`
})
}

mostra()

</script>

</body>
</html>
